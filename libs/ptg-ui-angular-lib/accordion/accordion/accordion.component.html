<div [ngClass]="classes">
  <div *ngFor="let item of listData; let i = index" [ngClass]="item.customClass || ''">
    <div class="accordion-header" [ngClass]="{ 'isOpen': item.isOpen, 'isDisabled': item.isDisabled }" (click)="!item.isDisabled && toggleItem(i)">
      {{ item.title }}
    </div>
    <div class="accordion-body" *ngIf="item.isOpen">
      {{ item.description }}
    </div>
  </div>
</div>
