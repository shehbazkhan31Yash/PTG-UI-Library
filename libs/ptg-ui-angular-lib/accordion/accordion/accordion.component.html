<accordion [isAnimated]="isAnimated || false" [closeOthers]="oneAtATime || false" class="pb-2 mt-5">
  <ng-container *ngIf="addAccordionGroup">
    <accordion-group *ngFor="let item of listData" [isDisabled]="item.isDisabled || false" [ngClass]="classes"
      [heading]="item.title" [isOpen]="item.isOpen || false" [panelClass]="item.panelClass || ''"  (isOpenChange)="change($event)">
      {{ item.description }}
    </accordion-group>
  </ng-container>
  <ng-container *ngIf="!addAccordionGroup">
    <accordion-panel  *ngFor="let item of listData" [isDisabled]="item.isDisabled || false" [ngClass]="classes"
      [heading]="item.title" [isOpen]="item.isOpen || false" [panelClass]="item.panelClass || ''" (isOpenChange)="change($event)">
      {{ item.description }}
    </accordion-panel>
  </ng-container>
</accordion>
