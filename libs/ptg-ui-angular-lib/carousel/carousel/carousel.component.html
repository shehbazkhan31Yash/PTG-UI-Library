<div id="carouselExampleControls" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
        <div *ngFor="let item of carouselItems; let i=index" class="carousel-item" [ngClass]="{'active':i===0}">
            <img [src]="item.image" class="d-block w-100" [alt]="item.alt">
            <div class="carousel-caption d-none d-md-block">
                <h5>{{item.caption}}</h5>
            </div>
        </div>
    </div>
    <button *ngIf="showControls" class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button *ngIf="showControls" class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
