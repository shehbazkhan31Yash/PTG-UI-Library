<div class="datepicker-wrapper" (clickOutside)="hideCalendar()">
  <input type="text" [placeholder]="placeholder" [value]="displayValue" [readOnly]="isReadOnly"
    (click)="toggleCalendar()" class="datepicker-input" />
  <div class="calendar" *ngIf="showCalendar">
    <div class="calendar-header">
      <button (click)="prevMonth()">&lt;</button>
      <span>{{ months[currentMonth] }} {{ currentYear }}</span>
      <button (click)="nextMonth()">&gt;</button>
    </div>
    <div class="calendar-body">
      <div class="calendar-weekdays">
        <span *ngFor="let day of days">{{day}}</span>
      </div>
      <div class="calendar-dates">
        <span *ngFor="let date of dates" (click)="selectDate(date)" [class.disabled]="isDisabled(date)"
          [class.selected]="isSelected(date)">
          {{ date.getDate() }}
        </span>
      </div>
    </div>
  </div>
</div>
