<!DOCTYPE html>
<html lang="en">
  <head>
    <title>YASH UI Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container text-center mt-5">
      <h1>Welcome to YASH UI Portal</h1>
      <p>You will be redirected shortly...</p>
    </div>
    <script>
      // Redirect to the YASH UI library after a short delay (e.g., 1 seconds)
      window.onload = function () {
        console.log('Redirecting to YASH UI library...');
        setTimeout(function () {
          window.location.href = './ptg-ui-apps-react-backend/';
        }, 0); // Delay in milliseconds
      };
    </script>
  </body>
</html>
