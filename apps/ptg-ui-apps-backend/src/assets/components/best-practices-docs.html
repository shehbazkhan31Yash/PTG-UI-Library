<!DOCTYPE html>
<html>
  <title>PTG UI Apps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css"
    integrity="sha384-b6lVK+yci+bfDmaY1u0zE8YYJt0TZxLEAFyYSLHId4xoVvsrQu3INevFKo+Xir8e"
    crossorigin="anonymous"
  />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <style type="text/css">
    .page-header {
      margin-bottom: 20px !important;
    }
    .content {
      flex: 1;
      /* Allow content to take the remaining space */
      overflow-y: auto;
      /* Enable vertical scrolling */
      padding: 20px;
      /* Add padding to the content */
      background-color: rgba(248, 249, 250, 0.9);
      /* Light gray background for content with transparency */
      border-radius: 8px;
      /* Rounded corners for content container */
    }

    .card {
      margin-bottom: 25px;
      min-height: 12rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background-color: #ffffff;
      /* White card background */
      border: 1px solid #0056b3;
      /* Reduced intensity blue border for cards */
    }

    .card-text {
      color: #000000;
      /* Black card text color */
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(0, 86, 179, 0.2);
      /* Light blue shadow on hover */
    }

    .card-title {
      font-weight: bold;
      color: #0056b3;
      /* Reduced intensity blue card title color */
    }

    .btn-primary {
      background-color: #0056b3;
      /* Reduced intensity primary button color */
      border-color: #0056b3;
      /* Reduced intensity primary button border color */
      transition: background-color 0.3s;
    }

    .btn-primary:hover {
      background-color: #004494;
      /* Darker blue on hover */
    }

    .btn-secondary {
      background-color: #6c757d;
      /* Secondary button color */
      border-color: #6c757d;
      /* Secondary button border color */
    }

    .btn-secondary:hover {
      background-color: #5a6268;
      /* Darker secondary button on hover */
    }
  </style>

  <body>
    <div class="container">
      <h2 class="page-header">Best Practices Documents</h2>
      <div class="row">
        <div class="col-md-4">
          <div class="card">
            <div class="card-body" style="min-height: 120px">
              <h5 class="card-title">Coding Standard Angular</h5>
              <p class="card-text">
                This document explains coding standards of Angular.
              </p>
            </div>
            <div class="card-footer">
              <a
                content-disposition="attach"
                class="btn btn-primary"
                href="../uploads/CodingStandard-Angular.docx"
                target="_blank"
                download
                >Download</a
              >
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card">
            <div class="card-body" style="min-height: 120px">
              <h5 class="card-title">Coding Standard React</h5>
              <p class="card-text">
                This document explains coding standards of React.
              </p>
            </div>
            <div class="card-footer">
              <a
                content-disposition="attach"
                class="btn btn-primary"
                href="../uploads/CodingStandard-React.docx"
                target="_blank"
                download
                >Download</a
              >
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card">
            <div class="card-body" style="min-height: 120px">
              <h5 class="card-title">Best Practices Frontend</h5>
              <p class="card-text">
                This document explains best practices of Frontend.
              </p>
            </div>
            <div class="card-footer">
              <a
                content-disposition="attach"
                class="btn btn-primary"
                href="../uploads/BestPractices-FrontEnd.pptx"
                target="_blank"
                download
                >Download</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
