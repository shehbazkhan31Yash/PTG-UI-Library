<!--  Drag and Drop Example 2 Wrapper -->

<div class="container mt-5">
  <ptg-ui-toggle-code
  [htmlCode]="dragAndDropHtmlCode"
  [tsCode]="dragAndDropTsCode"
>
</ptg-ui-toggle-code>
<h3>Todo List</h3>
<div
  class="list-group mt-5"
  (dragover)="onDragOver($event)"
  (drop)="onDrop($event, 'todo')"
>
  <div
    *ngFor="let item of todoData; let i = index"
    class="list-group-item d-flex justify-content-between align-items-center"
    draggable="true"
    (dragstart)="onDragStart($event, i, 'todo')"
  >
    {{ i + 1 }} - {{ item }}
  </div>
</div>

<h3 class="mt-4">Done List</h3>
<div
  class="list-group"
  (dragover)="onDragOver($event)"
  (drop)="onDrop($event, 'done')"
>
  <div
    *ngFor="let item of doneData; let i = index"
    class="list-group-item d-flex justify-content-between align-items-center"
    draggable="true"
    (dragstart)="onDragStart($event, i, 'done')"
  >
    {{ i + 1 }} - {{ item }}
  </div>
</div>
</div>
