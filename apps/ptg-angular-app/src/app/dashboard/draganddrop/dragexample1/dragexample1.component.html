<div class="container mt-5">
  <h2>Drag and Drop Table</h2>
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Name</th>
        <th>Value</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items; let i = index"
          draggable="true"
          (dragstart)="onDragStart(i)"
          (dragover)="onDragOver($event)"
          (drop)="onDrop(i)">
        <td>{{ item.name }}</td>
        <td>{{ item.value }}</td>
      </tr>
    </tbody>
  </table>
</div>
