<div class="px-2">
    <div class="row bg-white rounded">
        <div class="col-12 parent-block  justify-content-between align-items-center">
            <h3 class="p-3" [innerHTML]="'BUTTON' | translate"></h3>
            <ptg-ui-toggle-code [htmlCode]="htmlCode" [tsCode]="tsCode"></ptg-ui-toggle-code>
        </div>
        <hr class="css-yasiti" />
        <div class="row p-3">
            <div>
                <div class="mb-4">
                    <p>Success button </p>
                    <ptg-ui-button [btnStyleType]="'success'" label="Success Button"></ptg-ui-button>
                </div>
                <div class="mb-4">
                    <p>Primary button </p>
                    <ptg-ui-button [btnStyleType]="'primary'" label="Success Button"></ptg-ui-button>
                </div>
                <div class="mb-4">
                    <p>Info button </p>
                    <ptg-ui-button [btnStyleType]="'info'" label="Success Button"></ptg-ui-button>
                </div>
                <div class="mb-4">
                    <p>Large button </p>
                    <ptg-ui-button [size]="'large'" [btnStyleType]="'primary'" label="Large Button"></ptg-ui-button>
                </div>
                <div class="mb-4">
                    <p>Small button </p>
                    <ptg-ui-button [size]="'small'" [btnStyleType]="'primary'" label="Small Button"></ptg-ui-button>
                </div>
            </div>
           
        </div>
    </div>
</div>
