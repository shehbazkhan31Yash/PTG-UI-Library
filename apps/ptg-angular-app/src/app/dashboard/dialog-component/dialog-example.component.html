<div class="row px-2 py-2">
  <div class="col-12 mb-4 parent-block bg-white p-0  rounded">
    <div class="justify-content-between align-items-center p-3">
      <h3 [innerHTML]="'DIALOG_WITH_SLOT_EXAMPLE' | translate"></h3>
      <ptg-ui-toggle-code
        [htmlCode]="htmlCode"
        [tsCode]="tsCode"
      ></ptg-ui-toggle-code>
    </div>
    <hr class="m-0 css-yasiti"  />
    <div class="pb-3 p-3">
      <ptg-ui-dialog [isStaticBackdrop]="isStaticBackdrop" [isKeyboardEnabled]="isKeyboardEnabled" 
      [hideModal]="hideModal"></ptg-ui-dialog>
     </div>
  </div>
  <div class="col-12 parent-block bg-white p-0 rounded">
    <div class="justify-content-between align-items-center p-3">
      <h3 [innerHTML]="'DIALOG_WITH_OPTIONAL_FOOTER_EXAMPLE' | translate"></h3>
    <ptg-ui-toggle-code
      [htmlCode]="htmlCodeToHideFooter"
      [tsCode]="tsCode"
    ></ptg-ui-toggle-code>
    </div>
    <hr class="m-0 css-yasiti" />
    <div class="pb-3 p-3">
      <ptg-ui-dialog [isStaticBackdrop]="isStaticBackdrop" [isKeyboardEnabled]="isKeyboardEnabled" 
          [hideModal]="hideModal" [isFooterOpen]="isFooterOpen" [modalId]="modalId"></ptg-ui-dialog>
    </div>
  </div>
</div>
