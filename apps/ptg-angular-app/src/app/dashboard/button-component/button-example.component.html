<div class="px-2">
  <div class="row mt-3 bg-white rounded">
    <div class="col-12 parent-block  justify-content-between align-items-center">
      <h3 class="p-3" [innerHTML]="'BUTTON_EXAMPLE' | translate"></h3>
      <ptg-ui-toggle-code [htmlCode]="htmlCode" [tsCode]="tsCode"></ptg-ui-toggle-code>
    </div>
    <hr class="css-yasiti" />
    <div class="row p-3">
      <div class="col-md-12">
        <span class="p-1"><ptg-ui-button [size]="'medium'" [label]="'Primary'" [btnStyleType]="'primary'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1"><ptg-ui-button [size]="'medium'" [label]="'Secondary'" [btnStyleType]="'secondary'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1"> <ptg-ui-button [size]="'medium'" [label]="'Success'" [btnStyleType]="'success'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Danger'" [btnStyleType]="'danger'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Warning'" [btnStyleType]="'warning'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Info'" [btnStyleType]="'info'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Light'" [btnStyleType]="'light'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Dark'" [btnStyleType]="'dark'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Link'" [btnStyleType]="'link'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
      </div>

    </div>
  </div>

  <div class="row mt-3 bg-white rounded">
    <div class="col-12 parent-block  justify-content-between align-items-center">
      <h3 class="p-3" [innerHTML]="'BUTTON_EXAMPLE_WITH_SIZES' | translate"></h3>
      <ptg-ui-toggle-code [htmlCode]="htmlCodeForDisable" [tsCode]="tsCode"></ptg-ui-toggle-code>
    </div>
    <hr class="css-yasiti" />
    <div class="row p-3">
      <div class="col-md-12">
        <span class="p-1"><ptg-ui-button [size]="'small'" [label]="'Small'" [btnStyleType]="'primary'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1"><ptg-ui-button [size]="'medium'" [label]="'Medium'" [btnStyleType]="'primary'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1"> <ptg-ui-button [size]="'large'" [label]="'Large'" [btnStyleType]="'primary'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'extra-large'" [label]="'Extra-Large'" [btnStyleType]="'primary'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>

        <span class="p-1">
          <ptg-ui-button [isDisable]="true" [size]="'extra-large'" [label]="'Disabled'"
            [btnStyleType]="'primary'"></ptg-ui-button>
        </span>

        <div class="p-1 mt-2">
          <ptg-ui-button [isBlock]="true" [size]="'large'" [label]="'Block'" [btnStyleType]="'primary'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </div>
      </div>

    </div>
  </div>
</div>
