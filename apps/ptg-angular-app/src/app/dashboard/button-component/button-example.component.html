<div class="px-2">
  <div class="row bg-white rounded">
    <div class="col-12 parent-block  justify-content-between align-items-center">
      <h3 class="p-3" [innerHTML]="'BUTTON' | translate"></h3>
      <ptg-ui-toggle-code [htmlCode]="htmlCode" [tsCode]="tsCode"></ptg-ui-toggle-code>
    </div>
    <hr class="css-yasiti" />
    <div class="row p-3">
      <div class="col-md-12">
        <span class="p-1"><ptg-ui-button [size]="'medium'" [label]="'Primary'" [btnStyleType]="'primary'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1"><ptg-ui-button [size]="'medium'" [label]="'Secondary'" [btnStyleType]="'secondary'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1"> <ptg-ui-button [size]="'medium'" [label]="'Success'" [btnStyleType]="'success'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Danger'" [btnStyleType]="'danger'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Warning'" [btnStyleType]="'warning'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Info'" [btnStyleType]="'info'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Light'" [btnStyleType]="'light'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Dark'" [btnStyleType]="'dark'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
        <span class="p-1">
          <ptg-ui-button [size]="'medium'" [label]="'Link'" [btnStyleType]="'link'"
            (buttonClick)="onButtonClick($event)"></ptg-ui-button>
        </span>
      </div>

    </div>
  </div>
</div>
<div>
  <ptg-ui-button [size]="'small'" [label]="'Small Primary Button'" [btnStyleType]="'primary'"
    (buttonClick)="onButtonClick($event)"></ptg-ui-button>

  <ptg-ui-button [size]="'medium'" [label]="'Medium Secondary Button'" [btnStyleType]="'secondary'"
    (buttonClick)="onButtonClick($event)"></ptg-ui-button>

  <ptg-ui-button [size]="'large'" [label]="'Large Success Button'" [btnStyleType]="'success'"
    (buttonClick)="onButtonClick($event)"></ptg-ui-button>

  <ptg-ui-button [size]="'extra-large'" [label]="'Extra Large Danger Button'" [btnStyleType]="'danger'"
    (buttonClick)="onButtonClick($event)"></ptg-ui-button>

  <ptg-ui-button [size]="'medium'" [label]="'Medium Warning Button'" [btnStyleType]="'warning'"
    (buttonClick)="onButtonClick($event)"></ptg-ui-button>

  <ptg-ui-button [size]="'medium'" [label]="'Medium Info Button'" [btnStyleType]="'info'"
    (buttonClick)="onButtonClick($event)"></ptg-ui-button>

  <ptg-ui-button [size]="'medium'" [label]="'Medium Light Button'" [btnStyleType]="'light'"
    (buttonClick)="onButtonClick($event)"></ptg-ui-button>

  <ptg-ui-button [size]="'medium'" [label]="'Medium Dark Button'" [btnStyleType]="'dark'"
    (buttonClick)="onButtonClick($event)"></ptg-ui-button>

  <ptg-ui-button [size]="'medium'" [label]="'Medium Link Button'" [btnStyleType]="'link'"
    (buttonClick)="onButtonClick($event)"></ptg-ui-button>
</div>
