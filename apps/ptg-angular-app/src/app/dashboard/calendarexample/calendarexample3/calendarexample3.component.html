<div class="wrapper p-1">
    <section>
        <div class="form-wrapper">
            <form class="form-login" [formGroup]="calendarForm" (ngSubmit)="onFormSubmit($event)">
                <div class="row">
                    <div class="col-12">
                        <div class="row">
                            <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 mb-3">
                                <label for="'startDate2'" [innerHTML]="resources.BLUE_THEME"></label>
                                <div class="row">
                                    <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                        <ptg-ui-calendar [placeholder]="resources.DATE_PLACEHOLDER" [minDate]="minDate"
                                            class="w-100" [id]="'startDate2'" formControlName="startDate"
                                            [colorTheme]="'theme-blue'"
                                            (calendarValueChange)="onStartDateChange($event)">
                                        </ptg-ui-calendar>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12">
                                <label for="endDate2">{{ resources.RED_THEME }}</label>

                                <div class="row">
                                    <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                                        <ptg-ui-calendar [colorTheme]="'theme-red'"
                                            [placeholder]="resources.DATE_PLACEHOLDER" [minDate]="endMinDate"
                                            class="w-100" formControlName="endDate" [disabled]="isDisabled"
                                            id="endDate2" (calendarValueChange)="onEndDateChange($event)">
                                        </ptg-ui-calendar>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </section>
</div>
